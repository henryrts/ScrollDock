name: Android

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK packages
        run: sdkmanager --install "platforms;android-36" "build-tools;36.0.0"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.0"
      - name: Test
        run: |
          set +e
          gradle testDebugUnitTest --stacktrace --console=plain > test-build.log 2>&1
          code=$?
          echo "Gradle exit code: $code"
          exit $code
      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ScrollDock-test-log
          path: test-build.log
          if-no-files-found: error
      - name: Build debug APK
        run: gradle assembleDebug --stacktrace --console=plain
      - uses: actions/upload-artifact@v4
        with:
          name: ScrollDock-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
